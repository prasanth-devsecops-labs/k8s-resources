apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  # Labels for the Deployment object itself
  labels:
    project: roboshop
    purpose: replicaset-demo
    tier: frontend
    component: frontend
  annotations:
    # Appears in 'kubectl rollout history'
    kubernetes.io/change-cause: "moving to 1.29.7"
spec:
  replicas: 4
  selector:
    # The Deployment uses these to find and manage its Pods
    matchLabels:
      project: roboshop
      purpose: replicaset-demo
      tier: frontend
      component: frontend
  # Template defines the Pods that will be created
  template:
    metadata:
      # These MUST match the 'selector' labels above
      labels:
        project: roboshop
        purpose: replicaset-demo
        tier: frontend
        component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:1.29.7
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
spec:
  clusterIP: None
  selector:
    # labels are used as selectors
    project: roboshop
    component: frontend
  ports:
  - protocol: TCP
    port: 80 # servie port
    targetPort: 80 # container port

